<text x="20" y="36" font-size="16" font-weight="bold" fill="#111111">ULX3S GPIO -- grouped by KGPE-D16 connector</text>
<text x="20" y="52" fill="#111111">Each cell is one ULX3S header pin: gpN/gnN (FPGA ball) with its header -- J1 = idx 0-13, J2 = idx 14-27. Source: emard/ulx3s ulx3s_v20.lpf + MANUAL.md.</text>
<text x="20" y="66" fill="#111111">idx 11-13 are ESP32/wifi pins (unusable); idx 14-17 double as onboard ADC AIN0-7 (used anyway, ADC unused here). Confirm physical pin position against the silkscreen.</text>
