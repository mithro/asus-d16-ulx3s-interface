<text x="20" y="36" font-size="16" font-weight="bold" fill="#111111">ULX3S GPIO headers J1/J2 -- KGPE-D16 assignment</text>
<text x="20" y="50" fill="#111111">J1 = gp/gn idx 0-13, J2 = gp/gn idx 14-27 (emard/ulx3s ulx3s_v20.lpf + MANUAL.md). idx 11-13 shared with the on-board ESP32 (excluded from the usable pool).</text>
<text x="20" y="62" fill="#111111">idx 14-17 double as onboard ADC AIN0-7 -- assigned anyway (ADC unused by this design). No source gives through-hole pin numbers: confirm physical position against the silkscreen.</text>
<rect x="20" y="78" width="12" height="12" fill="#1b5e20" fill-opacity="0.2" stroke="#1b5e20"/>
